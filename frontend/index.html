<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
</script>
<script src="https://js.stripe.com/v3/"></script>
<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile, sendPasswordResetEmail } from "firebase/auth";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "firebase/firestore";

    const API_BASE = "/api";

    const firebaseConfig = {
        apiKey: "AIzaSyAe8-hjKY0OXgiMsyA2nf4Qup-KCrWKOw8",
        authDomain: "future-mystery-495215-d8.firebaseapp.com",
        projectId: "future-mystery-495215-d8",
        storageBucket: "future-mystery-495215-d8.firebasestorage.app",
        messagingSenderId: "768195103837",
        appId: "1:768195103837:web:e74c69b1dff4ece58651b4",
        measurementId: "G-7P5TBH6NJ8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app, "mydata");

    // ---------- Global state ----------
    let currentUser = null;
    let idToken = null;
    let credits = 20, gallery = [], lastDaily = null, totalGenerations = 0;
    let currentGenImage = null, currentEditImg = null, activeStyle = "realistic";
    let subscription = { plan: "free", expiry: null };
    let stripe = null;
    let elements = null;
    let card = null;
    let clientSecret = null;
    let pendingPlan = null;

    function showToast(msg, isErr = false) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerText = (isErr ? "❌ " : "✅ ") + msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ========== FIRESTORE – load user credits from /api/user/credits ==========
    async function loadUserCreditsFromBackend(uid) {
        try {
            const res = await fetch(`${API_BASE}/user/credits/${uid}`, {
                headers: { "Authorization": `Bearer ${idToken}` }
            });
            if (!res.ok) throw new Error("Failed to fetch credits");
            const data = await res.json();
            credits = data.credits;
            localStorage.setItem(`credits_${uid}`, credits);
            updateUI();
            return true;
        } catch (err) {
            console.error("Failed to load credits from backend:", err);
            return false;
        }
    }

    // ========== Update user data after any credit change (daily reward or payment) ==========
    function refreshCreditsFromBackend() {
        if (currentUser && idToken) {
            loadUserCreditsFromBackend(currentUser.uid);
        }
    }

    async function saveUserToFirestore(user, additionalData = {}) {
        if (!user) return false;
        try {
            const userRef = doc(db, "users", user.uid);
            const firstName = additionalData.firstName || (user.displayName ? user.displayName.split(" ")[0] : "");
            const lastName = additionalData.lastName || (user.displayName ? user.displayName.split(" ").slice(1).join(" ") : "");
            const baseData = {
                firstName, lastName,
                email: user.email,
                uid: user.uid,
                photoURL: user.photoURL || "",
                createdAt: serverTimestamp()
            };
            await setDoc(userRef, baseData, { merge: true });
            return true;
        } catch (err) {
            console.error("Firestore save error:", err);
            return false;
        }
    }

    // ========== Load / save local data (fallback) ==========
    function loadUserData() {
        if (!currentUser) {
            credits = 20; gallery = []; totalGenerations = 0;
            subscription = { plan: "free", expiry: null };
            lastDaily = null;
        } else {
            credits = parseInt(localStorage.getItem(`credits_${currentUser.uid}`) || "20");
            gallery = JSON.parse(localStorage.getItem(`gallery_${currentUser.uid}`) || "[]");
            lastDaily = localStorage.getItem(`daily_ts_${currentUser.uid}`) ? parseInt(localStorage.getItem(`daily_ts_${currentUser.uid}`)) : null;
            totalGenerations = parseInt(localStorage.getItem(`total_generations_${currentUser.uid}`) || "0");
            subscription.plan = localStorage.getItem(`subscription_plan_${currentUser.uid}`) || "free";
            subscription.expiry = localStorage.getItem(`subscription_expiry_${currentUser.uid}`) || null;
        }
        updateUI();
        renderGallery();
    }

    function saveUserData() {
        if (!currentUser) return;
        localStorage.setItem(`credits_${currentUser.uid}`, credits);
        localStorage.setItem(`gallery_${currentUser.uid}`, JSON.stringify(gallery));
        if (lastDaily) localStorage.setItem(`daily_ts_${currentUser.uid}`, lastDaily);
        localStorage.setItem(`total_generations_${currentUser.uid}`, totalGenerations);
        localStorage.setItem(`subscription_plan_${currentUser.uid}`, subscription.plan);
        if (subscription.expiry) localStorage.setItem(`subscription_expiry_${currentUser.uid}`, subscription.expiry);
        updateUI();
    }

    function updateUI() {
        document.getElementById("creditDisplay").innerText = credits;
        if (document.getElementById("dashCredits")) document.getElementById("dashCredits").innerText = credits;
        if (document.getElementById("dashCount")) document.getElementById("dashCount").innerText = gallery.length;
        if (document.getElementById("dashTotalGen")) document.getElementById("dashTotalGen").innerText = totalGenerations;
        if (document.getElementById("subPlanText")) document.getElementById("subPlanText").innerText = subscription.plan === "free" ? "Free tier" : `${subscription.plan} plan`;
        if (document.getElementById("subExpiry")) document.getElementById("subExpiry").innerText = subscription.expiry ? new Date(subscription.expiry).toLocaleDateString() : "—";
        const lastPreviewImg = document.getElementById("lastPreviewImg");
        if (lastPreviewImg) {
            if (gallery.length && gallery[0]) lastPreviewImg.src = gallery[0];
            else if (currentGenImage) lastPreviewImg.src = currentGenImage;
            else lastPreviewImg.src = "";
        }
        setDailyTimer();
    }

    function setDailyTimer() {
        const dailyBtn = document.getElementById("dailyRewardBtn");
        if (!dailyBtn) return;
        let timerSpan = document.getElementById("dailyTimer");
        if (!timerSpan) {
            timerSpan = document.createElement("span");
            timerSpan.id = "dailyTimer";
            dailyBtn.appendChild(timerSpan);
        }
        if (lastDaily && (Date.now() - lastDaily) < 86400000) {
            const hoursLeft = Math.ceil((86400000 - (Date.now() - lastDaily)) / 3600000);
            timerSpan.innerText = `(${hoursLeft}h left)`;
            dailyBtn.style.opacity = "0.6";
            dailyBtn.style.pointerEvents = "none";
        } else {
            timerSpan.innerText = "";
            dailyBtn.style.opacity = "1";
            dailyBtn.style.pointerEvents = "auto";
        }
    }

    function renderGallery() {
        const container = document.getElementById("galleryContainer");
        if (!container) return;
        if (!gallery.length) {
            container.innerHTML = "<p style='text-align:center'>No saved images</p>";
            return;
        }
        container.innerHTML = "";
        gallery.forEach(imgUrl => {
            const div = document.createElement("div");
            div.className = "gallery-card";
            div.onclick = () => window.open(imgUrl);
            div.innerHTML = `<img src="${imgUrl}"><div style="padding:0.5rem;"><button class="btn-secondary" onclick="event.stopPropagation(); downloadUrl('${imgUrl}')">Download</button></div>`;
            container.appendChild(div);
        });
    }

    function downloadUrl(url) {
        const a = document.createElement("a");
        a.href = url;
        a.download = `ai_image_${Date.now()}.png`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => a.remove(), 100);
    }

    // ---------- Auth functions ----------
    async function signupWithEmail() {
        const first = document.getElementById("signupFirst").value.trim();
        const last = document.getElementById("signupLast").value.trim();
        const email = document.getElementById("signupEmail").value.trim();
        const password = document.getElementById("signupPassword").value;
        const confirm = document.getElementById("signupConfirm").value;
        if (!first || !last || !email || !password) { showToast("Please fill all fields", true); return; }
        if (password !== confirm) { showToast("Passwords do not match", true); return; }
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(userCred.user, { displayName: `${first} ${last}` });
            await saveUserToFirestore(userCred.user, { firstName: first, lastName: last });
            showToast("Signup Successful ✅");
            closeAuthModal();
        } catch (err) { showToast(err.message, true); }
    }

    async function loginWithEmail() {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;
        if (!email || !password) { showToast("Email and password required", true); return; }
        try {
            await signInWithEmailAndPassword(auth, email, password);
            showToast("Login Successful ✅");
            closeAuthModal();
        } catch (err) { showToast(err.message, true); }
    }

    async function loginWithGoogle() {
        const provider = new GoogleAuthProvider();
        try {
            await signInWithPopup(auth, provider);
            showToast("Google Login Successful ✅");
            closeAuthModal();
        } catch (err) {
            if (err.code === "auth/operation-not-allowed") {
                showToast("Google Sign-In not enabled in Firebase Console.", true);
            } else {
                showToast(err.message, true);
            }
            document.getElementById("googleErrorMsg").innerText = err.message;
        }
    }

    async function logout() {
        await signOut(auth);
        localStorage.clear();
        window.location.reload();
    }

    document.getElementById("forgotPasswordLink")?.addEventListener("click", (e) => {
        e.preventDefault();
        document.getElementById("forgotPasswordForm").style.display = "block";
    });
    document.getElementById("sendResetBtn")?.addEventListener("click", async () => {
        const email = document.getElementById("resetEmail").value.trim();
        if (!email) { showToast("Enter your email address", true); return; }
        try {
            await sendPasswordResetEmail(auth, email);
            showToast("Password reset email sent!");
            document.getElementById("forgotPasswordForm").style.display = "none";
            document.getElementById("resetEmail").value = "";
        } catch (err) { showToast(err.message, true); }
    });
    document.getElementById("cancelResetBtn")?.addEventListener("click", () => {
        document.getElementById("forgotPasswordForm").style.display = "none";
        document.getElementById("resetEmail").value = "";
    });

    // ---------- Stripe ----------
    async function initStripe() {
        try {
            const res = await fetch(`${API_BASE}/stripe-key`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (data.publishableKey && data.publishableKey.startsWith("pk_")) {
                stripe = Stripe(data.publishableKey);
                elements = stripe.elements();
                card = elements.create("card", { style: { base: { color: "#fff", fontSize: "16px" } } });
                card.mount("#card-element");
                card.addEventListener("change", (event) => {
                    const displayError = document.getElementById("card-errors");
                    displayError.textContent = event.error ? event.error.message : "";
                });
                console.log("✅ Stripe initialized");
            }
        } catch (err) {
            console.error("Stripe init failed", err);
            showToast("Payment system unavailable", true);
        }
    }

    async function showPaymentModal(plan, creditsAmt, price) {
        if (!stripe) await initStripe();
        if (!stripe) { showToast("Payment system unavailable", true); return; }
        if (!currentUser) { showToast("Please sign in first", true); openAuthModal(); return; }

        pendingPlan = { plan, creditsAmt, price };
        document.getElementById("paymentPlanName").innerText = plan.charAt(0).toUpperCase() + plan.slice(1);
        document.getElementById("paymentCredits").innerText = creditsAmt;
        document.getElementById("paymentAmount").innerText = price;

        const token = await currentUser.getIdToken();
        const res = await fetch(`${API_BASE}/create-payment-intent`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
            body: JSON.stringify({ amount: price, credits: creditsAmt, planName: plan })
        });
        const data = await res.json();
        if (data.clientSecret) {
            clientSecret = data.clientSecret;
            document.getElementById("paymentModal").classList.add("active");
        } else {
            showToast("Failed to initiate payment", true);
        }
    }

    async function handlePaymentSuccess(creditsAmount, plan = null) {
        if (!currentUser) {
            console.error("No user logged in");
            return false;
        }
        try {
            const body = {
                userId: currentUser.uid,
                credits: creditsAmount
            };
            if (plan) body.plan = plan;

            const res = await fetch(`${API_BASE}/payment-success`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${idToken}`
                },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (!data.success) throw new Error(data.error);
            console.log("Backend credits update successful:", data);
            credits = data.newCredits;
            localStorage.setItem(`credits_${currentUser.uid}`, credits);
            updateUI();
            return true;
        } catch (err) {
            console.error("Failed to update credits on backend:", err);
            showToast("Payment succeeded but failed to update credits. Please contact support.", true);
            return false;
        }
    }

    async function confirmPayment() {
        if (!stripe || !clientSecret) return;
        const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
            payment_method: { card: card }
        });
        if (error) {
            showToast(error.message, true);
            document.getElementById("card-errors").innerText = error.message;
        } else if (paymentIntent.status === "succeeded") {
            const updated = await handlePaymentSuccess(pendingPlan.creditsAmt, pendingPlan.plan);
            if (updated) {
                subscription.plan = pendingPlan.plan;
                const expiry = new Date();
                if (pendingPlan.plan === "weekly") expiry.setDate(expiry.getDate() + 7);
                else if (pendingPlan.plan === "15days") expiry.setDate(expiry.getDate() + 15);
                else if (pendingPlan.plan === "monthly") expiry.setMonth(expiry.getMonth() + 1);
                subscription.expiry = expiry.toISOString();
                saveUserData();
                updateUI();
                showToast(`Payment successful! +${pendingPlan.creditsAmt} credits added.`);
            }
            document.getElementById("paymentModal").classList.remove("active");
            if (card) card.clear();
            pendingPlan = null;
            clientSecret = null;
        }
    }

    // ========== DAILY REWARD ==========
    async function claimDaily() {
        if (!currentUser) {
            showToast("Please sign in first", true);
            return;
        }

        try {
            const res = await fetch(`${API_BASE}/daily-reward`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${idToken}`
                },
                body: JSON.stringify({ userId: currentUser.uid })
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "Failed to claim");

            credits = data.newCredits;
            localStorage.setItem(`credits_${currentUser.uid}`, credits);
            updateUI();
            showToast(data.message);
        } catch (err) {
            console.error("Daily reward error:", err);
            showToast(err.message, true);
        }
    }

    // ---------- AI API calls ----------
    async function fetchWithAuth(url, options = {}) {
        if (!idToken) throw new Error("No auth token");
        const headers = { ...options.headers, "Authorization": `Bearer ${idToken}` };
        const res = await fetch(`${API_BASE}${url}`, { ...options, headers });
        if (res.status === 401) {
            showToast("Session expired, please login again", true);
            logout();
            throw new Error("Unauthorized");
        }
        return res;
    }

    async function generate() {
        if (!currentUser) { showToast("Please sign in first", true); return; }
        const prompt = document.getElementById("genPrompt").value.trim();
        if (!prompt) { showToast("Enter a prompt", true); return; }
        if (credits < 1) { showToast("Insufficient credits", true); return; }
        document.getElementById("genLoader").style.display = "block";
        document.getElementById("genResult").style.display = "none";
        try {
            const res = await fetchWithAuth("/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt, style: activeStyle })
            });
            const data = await res.json();
            if (!data.success) throw new Error(data.error);
            currentGenImage = data.imageUrl;
            document.getElementById("genImage").src = currentGenImage;
            credits--;
            totalGenerations++;
            saveUserData();
            updateUI();
            document.getElementById("genLoader").style.display = "none";
            document.getElementById("genResult").style.display = "block";
            showToast("Generated!");
        } catch (err) {
            showToast(err.message, true);
            document.getElementById("genLoader").style.display = "none";
        }
    }

    async function editImage() {
        if (!currentUser) { showToast("Please sign in", true); return; }
        const file = document.getElementById("editUpload").files[0];
        const editDesc = document.getElementById("editPrompt").value;
        if (!file || !editDesc) { showToast("Select image and edit description", true); return; }
        if (credits < 2) { showToast("Need 2 credits", true); return; }
        const fd = new FormData();
        fd.append("image", file);
        fd.append("prompt", editDesc);
        document.getElementById("editLoader").style.display = "block";
        document.getElementById("editResult").style.display = "none";
        try {
            const res = await fetchWithAuth("/edit", { method: "POST", body: fd });
            const data = await res.json();
            if (!data.success) throw new Error(data.error);
            currentEditImg = data.imageUrl;
            document.getElementById("editResultImg").src = currentEditImg;
            credits -= 2;
            saveUserData();
            updateUI();
            document.getElementById("editLoader").style.display = "none";
            document.getElementById("editResult").style.display = "block";
            showToast("Edited (face preserved)");
        } catch (err) {
            showToast(err.message, true);
            document.getElementById("editLoader").style.display = "none";
        }
    }

    async function enhancePrompt() {
        const prompt = document.getElementById("genPrompt").value;
        if (!prompt) return;
        showToast("Enhancing...");
        setTimeout(() => {
            document.getElementById("genPrompt").value = prompt + ", ultra detailed, 4k, masterpiece";
            showToast("Enhanced");
        }, 500);
    }

    function saveCurrentToGallery(isEdited = false) {
        const img = isEdited ? currentEditImg : currentGenImage;
        if (!img) { showToast("No image to save", true); return; }
        gallery.unshift(img);
        saveUserData();
        renderGallery();
        showToast("Saved to gallery");
    }

    // ---------- Auth state listener ----------
    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            idToken = await user.getIdToken();
            await saveUserToFirestore(user);
            // Load credits from backend (which reads from Firestore)
            await loadUserCreditsFromBackend(user.uid);
            updateNavbarAfterLogin(user);
            loadUserData(); // local fallback
            closeAuthModal();
        } else {
            idToken = null;
            updateNavbarAfterLogin(null);
            loadUserData();
            openAuthModal();
        }
    });

    function updateNavbarAfterLogin(user) {
        const avatarDiv = document.getElementById("userAvatarBtn");
        if (!avatarDiv) return;
        if (user && user.photoURL) avatarDiv.innerHTML = `<img src="${user.photoURL}" class="avatar">`;
        else if (user) avatarDiv.innerHTML = `<i class="fas fa-user-check"></i>`;
        else avatarDiv.innerHTML = `<i class="fas fa-user-astronaut"></i>`;
    }

    function openAuthModal() { document.getElementById("authModal").classList.add("active"); }
    function closeAuthModal() { document.getElementById("authModal").classList.remove("active"); }

    document.addEventListener("DOMContentLoaded", () => {
        // Avatar click (same as before)
        document.getElementById("userAvatarBtn")?.addEventListener("click", () => {
            if (currentUser) {
                const existing = document.querySelector(".user-menu");
                if (existing) existing.remove();
                const menu = document.createElement("div");
                menu.className = "user-menu glass-card";
                menu.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <img src="${currentUser.photoURL || ''}" style="width:32px; height:32px; border-radius:50%;">
                        <div><strong>${currentUser.displayName || currentUser.email}</strong><br>${currentUser.email}</div>
                    </div>
                    <button id="logoutBtnFromMenu" class="btn-secondary" style="width:100%;">Logout</button>
                `;
                document.body.appendChild(menu);
                document.getElementById("logoutBtnFromMenu").addEventListener("click", logout);
                setTimeout(() => {
                    const closeHandler = (e) => {
                        if (!menu.contains(e.target) && e.target !== document.getElementById("userAvatarBtn")) {
                            menu.remove();
                            document.removeEventListener("click", closeHandler);
                        }
                    };
                    document.addEventListener("click", closeHandler);
                }, 100);
            } else {
                openAuthModal();
            }
        });

        document.getElementById("closeAuthBtn")?.addEventListener("click", closeAuthModal);
        document.getElementById("showSignupLink")?.addEventListener("click", (e) => { e.preventDefault(); document.getElementById("loginForm").style.display = "none"; document.getElementById("signupForm").style.display = "block"; });
        document.getElementById("showLoginLink")?.addEventListener("click", (e) => { e.preventDefault(); document.getElementById("signupForm").style.display = "none"; document.getElementById("loginForm").style.display = "block"; });
        document.getElementById("doLoginBtn")?.addEventListener("click", loginWithEmail);
        document.getElementById("doSignupBtn")?.addEventListener("click", signupWithEmail);
        document.getElementById("googleSignInBtn")?.addEventListener("click", loginWithGoogle);
        document.getElementById("googleSignupBtn")?.addEventListener("click", loginWithGoogle);

        document.getElementById("genBtn")?.addEventListener("click", generate);
        document.getElementById("enhanceBtn")?.addEventListener("click", enhancePrompt);
        document.getElementById("editBtn")?.addEventListener("click", editImage);
        document.getElementById("saveGenBtn")?.addEventListener("click", () => saveCurrentToGallery(false));
        document.getElementById("saveEditBtn")?.addEventListener("click", () => saveCurrentToGallery(true));
        document.getElementById("downloadGenBtn")?.addEventListener("click", () => currentGenImage && downloadUrl(currentGenImage));
        document.getElementById("downloadEditBtn")?.addEventListener("click", () => currentEditImg && downloadUrl(currentEditImg));
        document.getElementById("dailyRewardBtn")?.addEventListener("click", claimDaily);

        document.querySelectorAll(".subscribeBtn").forEach(btn => {
            btn.addEventListener("click", () => {
                if (!currentUser) { showToast("Please sign in first", true); openAuthModal(); return; }
                showPaymentModal(btn.dataset.plan, parseInt(btn.dataset.credits), parseInt(btn.dataset.price));
            });
        });
        document.getElementById("confirmPaymentBtn")?.addEventListener("click", confirmPayment);
        document.getElementById("cancelPaymentBtn")?.addEventListener("click", () => document.getElementById("paymentModal").classList.remove("active"));
        document.getElementById("applePayMock")?.addEventListener("click", () => showToast("Apple Pay coming soon", true));
        document.getElementById("googlePayMock")?.addEventListener("click", () => showToast("Google Pay coming soon", true));
        document.getElementById("upgradePlanBtn")?.addEventListener("click", () => document.getElementById("paymentModal").classList.add("active"));

        // Tabs
        document.querySelectorAll(".tab").forEach(tab => {
            tab.addEventListener("click", () => {
                const target = tab.dataset.tab;
                document.querySelectorAll(".tab-pane").forEach(pane => pane.style.display = "none");
                const pane = document.getElementById(`${target}Tab`);
                if (pane) pane.style.display = "block";
                document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                if (target === "gallery") renderGallery();
            });
        });

        document.querySelectorAll(".style-card").forEach(card => {
            card.addEventListener("click", () => {
                document.querySelectorAll(".style-card").forEach(c => c.classList.remove("active"));
                card.classList.add("active");
                activeStyle = card.dataset.style;
            });
        });

        const zone = document.getElementById("uploadZone");
        const fileInput = document.getElementById("editUpload");
        if (zone && fileInput) {
            zone.addEventListener("click", () => fileInput.click());
            zone.addEventListener("dragover", e => e.preventDefault());
            zone.addEventListener("drop", e => {
                e.preventDefault();
                if (e.dataTransfer.files.length) fileInput.files = e.dataTransfer.files;
                fileInput.dispatchEvent(new Event("change"));
            });
            fileInput.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = ev => document.getElementById("editPreview").innerHTML = `<img src="${ev.target.result}" style="max-width:200px; border-radius:16px;">`;
                    reader.readAsDataURL(file);
                }
            });
        }

        loadUserData();
        initStripe();
    });
</script>
</body>
</html>
