<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Studio Pro – Complete Working</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0c12, #03050b);
            color: white;
            min-height: 100vh;
            padding: 1rem;
        }
        .glass-card {
            background: rgba(18,22,35,0.65);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(72,187,255,0.2);
            transition: 0.25s;
        }
        .btn-primary {
            background: linear-gradient(105deg, #3b82f6, #a855f7);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            color: white;
        }
        .premium-input, .premium-textarea {
            background: #0f172a;
            border: 1px solid #2d3a5e;
            border-radius: 1.2rem;
            padding: 1rem;
            color: white;
            width: 100%;
            margin: 0.5rem 0;
        }
        .upload-zone {
            border: 2px dashed #8b5cf6;
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            background: rgba(15,23,42,0.4);
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
            gap: 1rem;
        }
        .gallery-card {
            background: rgba(15,23,42,0.7);
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
        }
        .gallery-card img { width: 100%; height: 180px; object-fit: cover; }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: #0f172a;
            border-radius: 2rem;
            padding: 1.5rem;
            width: 460px;
            max-width: 90%;
            text-align: center;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 40px;
            border-left: 4px solid #8b5cf6;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .tabs { display: flex; gap: 0.8rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .tab {
            background: none;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            color: #ccc;
            cursor: pointer;
        }
        .tab.active { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; }
        .loader { text-align: center; padding: 2rem; display: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #8b5cf6; border-radius: 50%; animation: spin 1s infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-img { max-width: 100%; border-radius: 1.5rem; margin-top: 1rem; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .error-text { color: #f87171; font-size: 0.8rem; margin-top: 0.5rem; text-align: center; }
        .style-grid { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
        .style-card {
            background: #0f172a;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #2d3a5e;
        }
        .style-card.active { background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-color: transparent; }
        .user-menu {
            position: fixed;
            top: 70px;
            right: 20px;
            background: #0f172a;
            border-radius: 1rem;
            padding: 1rem;
            min-width: 220px;
            z-index: 10000;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
<div style="max-width: 1300px; margin: 0 auto;">
    <!-- Navbar -->
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 44px; height: 44px; background: linear-gradient(135deg, #3b82f6, #a855f7); border-radius: 18px; display: flex; align-items: center; justify-content: center;"><i class="fas fa-brain"></i></div>
            <h1 style="font-size: 1.8rem; background: linear-gradient(135deg,#a5f3fc,#c084fc); -webkit-background-clip: text; background-clip: text; color: transparent;">AI Studio Pro</h1>

        <div style="display: flex; gap: 1rem; align-items: center;">

    <!-- Tabs, Generate, Edit, Gallery, Dashboard – keep your existing structure, but for brevity I'll include a minimal version.

            <input id="negPrompt" class="premium-input" placeholder="Negative prompt">
            <div class="style-grid"><div class="style-card active" data-style="realistic">Realistic</div><div class="style-card" data-style="anime">Anime</div><div class="style-card" data-style="cinematic">Cinematic</div><div class="style-card" data-style="cyberpunk">Cyberpunk</div><div class="style-card" data-style="fantasy">Fantasy</div><div class="style-card" data-style="portrait">Portrait</div></div>
            <button id="genBtn" class="btn-primary">Generate (1 credit)</button>

        <div id="genResult" style="display:none;"><img id="genImage" class="result-img"><button id="downloadGenBtn">Download</button> <button id="saveGenBtn">Save</button></div>
    </div>
    <!-- Edit, Gallery, Dashboard – similar, but keep your existing content. -->
</div>

<!-- Auth Modal -->
<div id="authModal" class="modal-overlay">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between;"><h3>Access Account</h3><button id="closeAuthBtn">&times;</button></div>
        <div id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="doLoginBtn">Sign In</button>

            <a href="#" id="showSignupLink">Sign up</a>
            <a href="#" id="forgotPasswordLink">Forgot password?</a>

        <div id="signupForm" style="display:none;">
            <input id="signupFirst" placeholder="First name"><input id="signupLast" placeholder="Last name">
            <input id="signupEmail" placeholder="Email">
            <input id="signupPassword" placeholder="Password">
            <input id="signupConfirm" placeholder="Confirm password">
            <button id="doSignupBtn">Create account</button>
            <button id="googleSignupBtn">Continue with Google</button>
            <a href="#" id="showLoginLink">Sign in</a>

</div>

<!-- Payment Modal -->
<div id="paymentModal" class="modal-overlay">
    <div class="modal-content"><h3>Secure Checkout</h3><div id="paymentSummary"></div><div id="card-element"></div><div id="card-errors"></div><button id="confirmPaymentBtn">Pay now</button><button id="cancelPaymentBtn">Cancel</button></div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
</script>
<script src="https://js.stripe.com/v3/"></script>
<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile, sendPasswordResetEmail } from "firebase/auth";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "firebase/firestore";

    const API_BASE = "/api";

    const firebaseConfig = {
        apiKey: "AIzaSyAe8-hjKY0OXgiMsyA2nf4Qup-KCrWKOw8",
        authDomain: "future-mystery-495215-d8.firebaseapp.com",
        projectId: "future-mystery-495215-d8",
        storageBucket: "future-mystery-495215-d8.firebasestorage.app",
        messagingSenderId: "768195103837",
        appId: "1:768195103837:web:e74c69b1dff4ece58651b4",
        measurementId: "G-7P5TBH6NJ8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app, "mydata");

    let currentUser = null;
    let idToken = null;
    let credits = 20, gallery = [], lastDaily = null, totalGenerations = 0;
    let currentGenImage = null, currentEditImg = null, activeStyle = "realistic";
    let subscription = { plan: "free", expiry: null };
    let stripe = null, card = null, clientSecret = null, pendingPlan = null;

    function showToast(msg, isErr = false) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerText = (isErr ? "❌ " : "✅ ") + msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function loadUserCreditsFromFirestore(uid) {
        try {
            const docSnap = await getDoc(doc(db, "users", uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                credits = data.credits !== undefined ? data.credits : 20;
                subscription.plan = data.subscriptionPlan || "free";
                subscription.expiry = data.subscriptionExpiry || null;
                localStorage.setItem(`credits_${uid}`, credits);
                localStorage.setItem(`subscription_plan_${uid}`, subscription.plan);
                if (subscription.expiry) localStorage.setItem(`subscription_expiry_${uid}`, subscription.expiry);
                return true;
            } else {
                // No document yet – create one with 20 credits
                await setDoc(doc(db, "users", uid), { credits: 20, createdAt: serverTimestamp() });
                credits = 20;
                localStorage.setItem(`credits_${uid}`, 20);
                return true;
            }
        } catch (err) {
            console.error("Failed to load Firestore user data:", err);
            return false;
        }
    }

    async function saveUserToFirestore(user, additionalData = {}) {
        if (!user) return false;
        const userRef = doc(db, "users", user.uid);
        try {
            const snap = await getDoc(userRef);
            const firstName = additionalData.firstName || (user.displayName ? user.displayName.split(" ")[0] : "");
            const lastName = additionalData.lastName || (user.displayName ? user.displayName.split(" ").slice(1).join(" ") : "");
            if (!snap.exists()) {
                await setDoc(userRef, {
                    firstName, lastName,
                    email: user.email,
                    uid: user.uid,
                    photoURL: user.photoURL || "",
                    createdAt: serverTimestamp()
                });
            }
            return true;
        } catch (err) {
            console.error("Firestore save error:", err);
            return false;
        }
    }

    function loadUserData() {
        if (!currentUser) {
            credits = 20; gallery = []; totalGenerations = 0;
            subscription = { plan: "free", expiry: null }; lastDaily = null;
        } else {
            credits = parseInt(localStorage.getItem(`credits_${currentUser.uid}`) || "20");
            gallery = JSON.parse(localStorage.getItem(`gallery_${currentUser.uid}`) || "[]");
            lastDaily = localStorage.getItem(`daily_ts_${currentUser.uid}`) ? parseInt(localStorage.getItem(`daily_ts_${currentUser.uid}`)) : null;
            totalGenerations = parseInt(localStorage.getItem(`total_generations_${currentUser.uid}`) || "0");
            subscription.plan = localStorage.getItem(`subscription_plan_${currentUser.uid}`) || "free";
            subscription.expiry = localStorage.getItem(`subscription_expiry_${currentUser.uid}`) || null;
        }
        updateUI();
        renderGallery();
    }
    function saveUserData() {
        if (!currentUser) return;
        localStorage.setItem(`credits_${currentUser.uid}`, credits);
        localStorage.setItem(`gallery_${currentUser.uid}`, JSON.stringify(gallery));
        if (lastDaily) localStorage.setItem(`daily_ts_${currentUser.uid}`, lastDaily);
        localStorage.setItem(`total_generations_${currentUser.uid}`, totalGenerations);
        localStorage.setItem(`subscription_plan_${currentUser.uid}`, subscription.plan);
        if (subscription.expiry) localStorage.setItem(`subscription_expiry_${currentUser.uid}`, subscription.expiry);
        updateUI();
    }

    function updateUI() {
        document.getElementById("creditDisplay").innerText = credits;
        if (document.getElementById("dashCredits")) document.getElementById("dashCredits").innerText = credits;
        if (document.getElementById("dashCount")) document.getElementById("dashCount").innerText = gallery.length;
        if (document.getElementById("dashTotalGen")) document.getElementById("dashTotalGen").innerText = totalGenerations;
        if (document.getElementById("subPlanText")) document.getElementById("subPlanText").innerText = subscription.plan === "free" ? "Free tier" : `${subscription.plan} plan`;
        if (document.getElementById("subExpiry")) document.getElementById("subExpiry").innerText = subscription.expiry ? new Date(subscription.expiry).toLocaleDateString() : "—";
        const lastPreviewImg = document.getElementById("lastPreviewImg");
        if (lastPreviewImg) {
            if (gallery.length && gallery[0]) lastPreviewImg.src = gallery[0];
            else if (currentGenImage) lastPreviewImg.src = currentGenImage;
            else lastPreviewImg.src = "";
        }
        if (document.getElementById("lastPreviewText")) document.getElementById("lastPreviewText").innerText = (gallery.length || currentGenImage) ? "Preview" : "No preview";
        setDailyTimer();
    }

    function setDailyTimer() {
        const dailyBtn = document.getElementById("dailyRewardBtn");
        if (!dailyBtn) return;
        let timerSpan = document.getElementById("dailyTimer");
        if (!timerSpan) {
            timerSpan = document.createElement("span");
            timerSpan.id = "dailyTimer";
            dailyBtn.appendChild(timerSpan);
        }
        if (lastDaily && (Date.now() - lastDaily) < 86400000) {
            const hoursLeft = Math.ceil((86400000 - (Date.now() - lastDaily)) / 3600000);
            timerSpan.innerText = `(${hoursLeft}h left)`;
            dailyBtn.style.opacity = "0.6";
            dailyBtn.style.pointerEvents = "none";
        } else {
            timerSpan.innerText = "";
            dailyBtn.style.opacity = "1";
            dailyBtn.style.pointerEvents = "auto";
        }
    }

    function renderGallery() {
        const container = document.getElementById("galleryContainer");
        if (!container) return;
        if (!gallery.length) {
            container.innerHTML = "<p>No saved images</p>";
            return;
        }
        container.innerHTML = "";
        gallery.forEach(imgUrl => {
            const div = document.createElement("div");
            div.className = "gallery-card";
            div.onclick = () => window.open(imgUrl);
            div.innerHTML = `<img src="${imgUrl}"><button class="btn-secondary" onclick="event.stopPropagation(); downloadUrl('${imgUrl}')">Download</button></div>`;
            container.appendChild(div);
        });
    }

    function downloadUrl(url) {
        const a = document.createElement("a");
        a.href = url;
        a.download = `ai_image_${Date.now()}.png`;
        a.click();
    }

    // Auth functions
    async function signupWithEmail() {
        const first = document.getElementById("signupFirst").value.trim();
        const last = document.getElementById("signupLast").value.trim();
        const email = document.getElementById("signupEmail").value.trim();
        const password = document.getElementById("signupPassword").value;
        const confirm = document.getElementById("signupConfirm").value;
        if (!first || !last || !email || !password) { showToast("Please fill all fields", true); return; }
        if (password !== confirm) { showToast("Passwords do not match", true); return; }
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(userCred.user, { displayName: `${first} ${last}` });
            await saveUserToFirestore(userCred.user, { firstName: first, lastName: last });
            await setDoc(doc(db, "users", userCred.user.uid), { credits: 20, createdAt: serverTimestamp() }, { merge: true });
            showToast("Signup Successful ✅");
            closeAuthModal();
        } catch (err) { showToast(err.message, true); }
    }

    async function loginWithEmail() {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;
        if (!email || !password) { showToast("Email and password required", true); return; }
        try {
            await signInWithEmailAndPassword(auth, email, password);
            showToast("Login Successful ✅");
            closeAuthModal();
        } catch (err) { showToast(err.message, true); }
    }

    async function loginWithGoogle() {
        const provider = new GoogleAuthProvider();
        try {
            await signInWithPopup(auth, provider);
            showToast("Google Login Successful ✅");
            closeAuthModal();
        } catch (err) {
            showToast(err.message, true);
            document.getElementById("googleErrorMsg").innerText = err.message;
        }
    }

    async function logout() {
        await signOut(auth);
        localStorage.clear();
        window.location.reload();
    }

    // Forgot password
    document.getElementById("forgotPasswordLink")?.addEventListener("click", (e) => {
        e.preventDefault();
        const email = prompt("Enter your email address:");
        if (email) sendPasswordResetEmail(auth, email).then(() => showToast("Password reset email sent!")).catch(err => showToast(err.message, true));
    });
    document.getElementById("showSignupLink")?.addEventListener("click", (e) => { e.preventDefault(); document.getElementById("loginForm").style.display = "none"; document.getElementById("signupForm").style.display = "block"; });
    document.getElementById("showLoginLink")?.addEventListener("click", (e) => { e.preventDefault(); document.getElementById("signupForm").style.display = "none"; document.getElementById("loginForm").style.display = "block"; });

    // Stripe
    async function initStripe() {
        try {
            const res = await fetch(`${API_BASE}/stripe-key`);
            const data = await res.json();
            if (data.publishableKey && data.publishableKey.startsWith("pk_")) {
                stripe = Stripe(data.publishableKey);
                const elements = stripe.elements();
                card = elements.create("card", { style: { base: { color: "#fff", fontSize: "16px" } } });
                card.mount("#card-element");
                card.on("change", (event) => {
                    const displayError = document.getElementById("card-errors");
                    displayError.textContent = event.error ? event.error.message : "";
                });
            }
        } catch (err) { console.error("Stripe init failed", err); showToast("Payment system unavailable", true); }
    }

    async function showPaymentModal(plan, creditsAmt, price) {
        if (!stripe) await initStripe();
        if (!stripe) { showToast("Payment unavailable", true); return; }
        if (!currentUser) { showToast("Please sign in first", true); openAuthModal(); return; }
        pendingPlan = { plan, creditsAmt, price };
        document.getElementById("paymentPlanName").innerText = plan;
        document.getElementById("paymentCredits").innerText = creditsAmt;
        document.getElementById("paymentAmount").innerText = price;
        const token = await currentUser.getIdToken();
        const res = await fetch(`${API_BASE}/create-payment-intent`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
            body: JSON.stringify({ amount: price, credits: creditsAmt, planName: plan })
        });
        const data = await res.json();
        if (data.clientSecret) {
            clientSecret = data.clientSecret;
            document.getElementById("paymentModal").classList.add("active");
        } else showToast("Failed to initiate payment", true);
    }

    async function handlePaymentSuccess(creditsAmount, plan = null) {
        if (!currentUser) return false;
        try {
            const token = await currentUser.getIdToken();
            const res = await fetch(`${API_BASE}/payment-success`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify({ userId: currentUser.uid, credits: creditsAmount, plan })
            });
            const data = await res.json();
            if (!data.success) throw new Error(data.error);
            credits = data.newCredits;
            localStorage.setItem(`credits_${currentUser.uid}`, credits);
            updateUI();
            return true;
        } catch (err) { showToast("Payment succeeded but failed to update credits.", true); return false; }
    }

    async function confirmPayment() {
        if (!stripe || !clientSecret) return;
        const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, { payment_method: { card } });
        if (error) showToast(error.message, true);
        else if (paymentIntent.status === "succeeded") {
            await handlePaymentSuccess(pendingPlan.creditsAmt, pendingPlan.plan);
            if (pendingPlan.plan) subscription.plan = pendingPlan.plan;
            saveUserData();
            updateUI();
            showToast(`Payment successful! +${pendingPlan.creditsAmt} credits added.`);
            document.getElementById("paymentModal").classList.remove("active");
            if (card) card.clear();
            pendingPlan = null;
            clientSecret = null;
        }
    }

    // DAILY REWARD – fixed
    async function claimDaily() {
        if (!currentUser) { showToast("Please sign in first", true); return; }
        try {
            const token = await currentUser.getIdToken();
            const res = await fetch(`${API_BASE}/daily-reward`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify({ userId: currentUser.uid })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "Failed to claim");
            // Update credits from backend response
            credits = data.newCredits;
            localStorage.setItem(`credits_${currentUser.uid}`, credits);
            updateUI();
            showToast(data.message || "+10 credits added!");
        } catch (err) {
            console.error("Daily reward error:", err);
            showToast(err.message, true);
        }
    }

    // AI functions (generate, edit, etc.) – keep your existing implementation.
    async function generate() {
        if (!currentUser) { showToast("Please sign in first", true); return; }
        const prompt = document.getElementById("genPrompt").value.trim();
        if (!prompt) { showToast("Enter a prompt", true); return; }
        if (credits < 1) { showToast("Insufficient credits", true); return; }
        document.getElementById("genLoader").style.display = "block";
        try {
            const token = await currentUser.getIdToken();
            const res = await fetch(`${API_BASE}/generate`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify({ prompt, style: activeStyle })
            });
            const data = await res.json();
            if (!data.success) throw new Error(data.error);
            currentGenImage = data.imageUrl;
            document.getElementById("genImage").src = currentGenImage;
            credits--;
            totalGenerations++;
            saveUserData();
            updateUI();
            document.getElementById("genLoader").style.display = "none";
            document.getElementById("genResult").style.display = "block";
            showToast("Generated!");
        } catch (err) { showToast(err.message, true); document.getElementById("genLoader").style.display = "none"; }
    }

    function saveCurrentToGallery() {
        if (currentGenImage) { gallery.unshift(currentGenImage); saveUserData(); renderGallery(); showToast("Saved to gallery"); }
    }

    // Event listeners
    document.getElementById("genBtn")?.addEventListener("click", generate);
    document.getElementById("saveGenBtn")?.addEventListener("click", saveCurrentToGallery);
    document.getElementById("dailyRewardBtn")?.addEventListener("click", claimDaily);
    document.getElementById("doLoginBtn")?.addEventListener("click", loginWithEmail);
    document.getElementById("doSignupBtn")?.addEventListener("click", signupWithEmail);
    document.getElementById("googleSignInBtn")?.addEventListener("click", loginWithGoogle);
    document.getElementById("googleSignupBtn")?.addEventListener("click", loginWithGoogle);
    document.getElementById("closeAuthBtn")?.addEventListener("click", () => document.getElementById("authModal").classList.remove("active"));
    document.getElementById("userAvatarBtn")?.addEventListener("click", () => {
        if (currentUser) {
            // show logout menu – simplified
            const existing = document.querySelector(".user-menu");
            if (existing) existing.remove();
            const menu = document.createElement("div");
            menu.className = "user-menu glass-card";
            menu.innerHTML = `<div><img src="${currentUser.photoURL || ''}" style="width:32px; border-radius:50%;"><div><strong>${currentUser.displayName || currentUser.email}</strong><br>${currentUser.email}</div></div><button id="logoutBtnFromMenu" class="btn-secondary">Logout</button>`;
            document.body.appendChild(menu);
            document.getElementById("logoutBtnFromMenu").addEventListener("click", () => { logout(); menu.remove(); });
        } else document.getElementById("authModal").classList.add("active");
    });
    document.querySelectorAll(".subscribeBtn").forEach(btn => btn.addEventListener("click", () => showPaymentModal(btn.dataset.plan, parseInt(btn.dataset.credits), parseInt(btn.dataset.price))));
    document.getElementById("confirmPaymentBtn")?.addEventListener("click", confirmPayment);
    document.getElementById("cancelPaymentBtn")?.addEventListener("click", () => document.getElementById("paymentModal").classList.remove("active"));
    // Tab switching (simplified)
    document.querySelectorAll(".tab").forEach(tab => tab.addEventListener("click", () => {
        const target = tab.dataset.tab;
        document.querySelectorAll(".tab-pane").forEach(p => p.style.display = "none");
        document.getElementById(`${target}Tab`).style.display = "block";
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        if (target === "gallery") renderGallery();
    }));

    // Style card selection
    document.querySelectorAll(".style-card").forEach(card => card.addEventListener("click", function() {
        document.querySelectorAll(".style-card").forEach(c => c.classList.remove("active"));
        this.classList.add("active");
        activeStyle = this.dataset.style;
    }));

    // Upload zone (simplified)
    document.getElementById("uploadZone")?.addEventListener("click", () => document.getElementById("editUpload").click());
    document.getElementById("editUpload")?.addEventListener("change", e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = ev => document.getElementById("editPreview").innerHTML = `<img src="${ev.target.result}" style="max-width:200px;">`;
            reader.readAsDataURL(file);
        }
    });

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            idToken = await user.getIdToken();
            await saveUserToFirestore(user);
            await loadUserCreditsFromFirestore(user.uid);
            updateNavbarAfterLogin(user);
            loadUserData();
            closeAuthModal();
        } else {
            idToken = null;
            updateNavbarAfterLogin(null);
            loadUserData();
            openAuthModal();
        }
    });
    function updateNavbarAfterLogin(user) {
        const avatarDiv = document.getElementById("userAvatarBtn");
        if (avatarDiv) avatarDiv.innerHTML = user?.photoURL ? `<img src="${user.photoURL}" class="avatar">` : (user ? '<i class="fas fa-user-check"></i>' : '<i class="fas fa-user-astronaut"></i>');
    }
    function openAuthModal() { document.getElementById("authModal").classList.add("active"); }
    function closeAuthModal() { document.getElementById("authModal").classList.remove("active"); }

    loadUserData();
    initStripe();
</script>
</body>
</html>
